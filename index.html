<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tina Townsend | Prestigious Mobile Notary</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:  #0a0f1e;
      --navy2: #111828;
      --gold:  #c9a84c;
      --gold2: #e8c97a;
      --cream: #f5efe6;
      --muted: #8a9ab5;
    }

    body {
      min-height: 100vh;
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Lato', sans-serif;
      padding: 24px 16px;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.07) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(201,168,76,0.05) 0%, transparent 55%);
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 480px;
      background: var(--navy2);
      border-radius: 24px;
      border: 1px solid rgba(201,168,76,0.25);
      padding: 44px 36px 36px;
      text-align: center;
      position: relative;
      overflow: hidden;
      animation: fadeUp .7s ease both;
      box-shadow: 0 4px 60px rgba(0,0,0,0.55), 0 0 0 1px rgba(201,168,76,0.08) inset;
    }

    /* Notary seal watermark */
    .card .watermark {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 0;
      opacity: 0.032;
    }
    .card .watermark svg {
      width: 75%;
      max-width: 340px;
    }

    /* Corner ornaments */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 90px; height: 90px;
      border-color: rgba(201,168,76,0.22);
      border-style: solid;
      z-index: 1;
    }
    .card::before { top: 14px; left: 14px; border-width: 1px 0 0 1px; border-radius: 6px 0 0 0; }
    .card::after  { bottom: 14px; right: 14px; border-width: 0 1px 1px 0; border-radius: 0 0 6px 0; }

    /* All inner content above watermark */
    .card > *:not(.watermark) { position: relative; z-index: 2; }

    /* ── Logo (top) ── */
    .logo-section {
      margin: 0 auto 20px;
      animation: fadeUp .7s .08s ease both;
    }
    .logo-box {
      width: 280px; height: 280px;
      border-radius: 50%;
      border: none;
      background: transparent;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .logo-box img { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; mix-blend-mode: lighten; }

    /* ── Profile photo ── */
    .photo-ring {
      width: 160px; height: 160px;
      border-radius: 50%;
      margin: 0 auto 22px;
      padding: 3px;
      background: linear-gradient(135deg, var(--gold), var(--gold2), var(--gold));
      position: relative;
      animation: fadeUp .7s .14s ease both;
    }
    /* Pulsing gold glow */
    .photo-ring::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 2px solid rgba(201,168,76,0.55);
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: .55; transform: scale(1); }
      50%       { opacity: .15; transform: scale(1.06); }
    }
    .photo-ring img {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }

    /* ── Name with shimmer ── */
    .name {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.35rem, 5vw, 1.7rem);
      font-weight: 600;
      letter-spacing: .06em;
      line-height: 1.2;
      margin-bottom: 10px;
      animation: fadeUp .7s .2s ease both;
      background: linear-gradient(
        90deg,
        var(--cream) 0%,
        var(--cream) 30%,
        var(--gold2) 45%,
        #fff9e8     50%,
        var(--gold2) 55%,
        var(--cream) 70%,
        var(--cream) 100%
      );
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeUp .7s .2s ease both, shimmer 3.5s linear 1.2s infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 100% center; }
      100% { background-position: -100% center; }
    }

    /* ── Gold divider ── */
    .divider {
      display: flex; align-items: center; gap: 10px;
      margin: 0 auto 12px; width: 80%;
      animation: fadeUp .7s .26s ease both;
    }
    .divider span { flex: 1; height: 1px; background: linear-gradient(to right, transparent, rgba(201,168,76,0.5), transparent); }
    .divider i    { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }

    /* ── Business name ── */
    .biz-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1rem, 3.8vw, 1.15rem);
      font-weight: 400; font-style: italic;
      color: var(--gold2);
      letter-spacing: .03em; line-height: 1.4;
      margin-bottom: 8px;
      animation: fadeUp .7s .32s ease both;
    }

    /* ── Tagline ── */
    .tagline {
      font-size: .72rem; font-weight: 300;
      letter-spacing: .25em; text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
      animation: fadeUp .7s .37s ease both;
    }

    /* ── Service area ── */
    .service-area {
      font-size: .7rem; font-weight: 300;
      letter-spacing: .12em; text-transform: uppercase;
      color: rgba(201,168,76,0.6);
      margin-bottom: 26px;
      animation: fadeUp .7s .41s ease both;
    }

    /* ── Thin divider ── */
    .hr {
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(201,168,76,0.2), transparent);
      margin: 0 0 22px;
      animation: fadeUp .7s .46s ease both;
    }

    /* ── Contact items ── */
    .contacts { display: flex; flex-direction: column; gap: 12px; animation: fadeUp .7s .51s ease both; }
    .contact-item {
      display: flex; align-items: center; gap: 14px;
      background: rgba(201,168,76,0.05);
      border: 1px solid rgba(201,168,76,0.12);
      border-radius: 12px; padding: 13px 18px;
      text-decoration: none;
      transition: background .25s, border-color .25s, transform .2s;
      cursor: pointer;
    }
    .contact-item:hover { background: rgba(201,168,76,0.1); border-color: rgba(201,168,76,0.35); transform: translateY(-2px); }
    .contact-icon {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, rgba(201,168,76,0.25), rgba(201,168,76,0.1));
      border: 1px solid rgba(201,168,76,0.3);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .contact-icon svg { width: 16px; height: 16px; fill: var(--gold); }
    .contact-text { text-align: left; }
    .contact-label { font-size: .6rem; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; }
    .contact-value { font-size: .9rem; color: var(--cream); font-weight: 300; letter-spacing: .02em; }

    /* ── Action buttons ── */
    .actions {
      display: flex; flex-direction: column; gap: 12px;
      margin-top: 20px;
      animation: fadeUp .7s .58s ease both;
    }

    .btn-book {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: var(--navy);
      font-family: 'Cinzel', serif;
      font-size: .78rem; font-weight: 600;
      letter-spacing: .12em; text-transform: uppercase;
      text-decoration: none;
      padding: 15px 24px;
      border-radius: 12px;
      border: none; cursor: pointer;
      transition: opacity .25s, transform .2s;
      box-shadow: 0 4px 20px rgba(201,168,76,0.25);
    }
    .btn-book:hover { opacity: .88; transform: translateY(-2px); }
    .btn-book svg { width: 16px; height: 16px; fill: var(--navy); flex-shrink: 0; }

    .btn-save {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: transparent;
      color: var(--gold);
      font-family: 'Cinzel', serif;
      font-size: .78rem; font-weight: 600;
      letter-spacing: .12em; text-transform: uppercase;
      padding: 14px 24px;
      border-radius: 12px;
      border: 1px solid rgba(201,168,76,0.4);
      cursor: pointer;
      transition: background .25s, border-color .25s, transform .2s;
    }
    .btn-save:hover { background: rgba(201,168,76,0.08); border-color: rgba(201,168,76,0.7); transform: translateY(-2px); }
    .btn-save svg { width: 16px; height: 16px; fill: var(--gold); flex-shrink: 0; }

    /* ── Footer ── */
    .footer {
      margin-top: 26px;
      font-size: .6rem; letter-spacing: .18em; text-transform: uppercase;
      color: rgba(138,154,181,0.4);
      animation: fadeUp .7s .64s ease both;
    }

    /* ── Copied toast ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--gold); color: var(--navy);
      font-size: .72rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase;
      padding: 10px 22px; border-radius: 30px;
      opacity: 0; pointer-events: none;
      transition: opacity .3s, transform .3s;
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (min-width: 520px) {
      .card { padding: 48px 48px 40px; }
    }

    /* ── QR Code ── */
    .qr-section {
      margin: 0 auto 22px;
      animation: fadeUp .7s .44s ease both;
    }
    .qr-img {
      width: 140px; height: 140px;
      border-radius: 12px;
      border: 2px solid rgba(201,168,76,0.35);
      display: block;
      margin: 0 auto 8px;
      transition: transform .2s, border-color .2s;
    }
    .qr-img:hover { transform: scale(1.04); border-color: rgba(201,168,76,0.75); }
    .qr-label {
      font-size: .62rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.6);
    }
  </style>
</head>
